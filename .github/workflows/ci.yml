name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Next.js App
        run: npm run build

  smart-contract-ci:
    name: Smart Contract CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt

      - name: Run Rustfmt
        working-directory: ./contracts
        run: cargo fmt --all --check

      - name: Fix Arbitrary Crate Issue
        working-directory: ./contracts
        run: cargo update -p arbitrary --precise 1.3.2 && cargo update -p derive_arbitrary --precise 1.3.2

      - name: Run Tests
        working-directory: ./contracts
        run: cargo test

      - name: Build Contracts
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release
